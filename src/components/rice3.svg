<svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .draw-line {
      fill: none;
      stroke: #1a1a1a;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      /* Магия анимации: делаем штрих огромным и сдвигаем его за пределы видимости */
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: grow 2.5s ease-out forwards;
    }
    
    /* Зерна появляются с небольшой задержкой */
    .draw-delay-1 { animation-delay: 0.5s; }
    .draw-delay-2 { animation-delay: 1.0s; }

    @keyframes grow {
      to { stroke-dashoffset: 0; }
    }
  </style>

  <path class="draw-line" d="M100,400 C120,300 80,200 100,100 C110,50 140,30 160,50" />
  
  <path class="draw-line draw-delay-1" d="M100,100 C80,110 70,130 75,145 C80,160 95,150 100,140" />
  <path class="draw-line draw-delay-1" d="M120,70 C105,80 100,100 105,115 C110,130 125,120 130,110" />
  <path class="draw-line draw-delay-2" d="M140,40 C130,60 135,80 145,90 C155,100 165,85 160,70" />
</svg>